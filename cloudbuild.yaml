# Google Cloud Build configuration for CropMind
# Builds and deploys API server + frontend to Cloud Run

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cropmind-api:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cropmind-api:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    id: 'build-image'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cropmind-api:$BUILD_ID'
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Push the latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/cropmind-api:latest'
    id: 'push-latest'
    waitFor: ['build-image']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cropmind-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/cropmind-api:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--timeout'
      - '300'
      - '--add-cloudsql-instances'
      - 'YOUR_PROJECT_ID:us-central1:cropmind-db'
      - '--set-env-vars'
      - 'NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=true,DATABASE_URL=postgresql://REDACTED_USER:REDACTED_PASSWORD@localhost/cropmind?host=/cloudsql/YOUR_PROJECT_ID:us-central1:cropmind-db'
    id: 'deploy-cloud-run'
    waitFor: ['push-image']

# Store built images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/cropmind-api:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/cropmind-api:latest'

# Build options
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
# Timeout for entire build
timeout: '1200s'
