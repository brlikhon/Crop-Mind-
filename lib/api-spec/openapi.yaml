openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CropMind API - APAC Agricultural Intelligence Network
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cropagent
    description: Multi-agent crop intelligence operations
  - name: mcp
    description: MCP tool server operations
  - name: cases
    description: Vector case intelligence operations
  - name: intelligence
    description: Regional crop risk intelligence operations
  - name: impact
    description: Impact modeling and business evidence operations
  - name: demo
    description: Judge demo and submission brief operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /cropagent/diagnose:
    post:
      operationId: diagnoseCrop
      tags: [cropagent]
      summary: Run multi-agent crop diagnosis
      description: Accepts a farmer's natural language query and runs it through the multi-agent orchestration system (CropDisease, Weather, Market, Treatment agents) returning a unified diagnosis with traces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnoseRequest"
      responses:
        "200":
          description: Successful diagnosis with full agent traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnoseResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /mcp/tools:
    get:
      operationId: listMcpTools
      tags: [mcp]
      summary: List available MCP tool servers
      description: Returns all registered MCP tool servers with their names, descriptions, and parameter schemas.
      responses:
        "200":
          description: List of available MCP tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolListResponse"
  /mcp/call:
    post:
      operationId: callMcpTool
      tags: [mcp]
      summary: Invoke an MCP tool by name
      description: Calls a specific MCP tool server with the provided parameters and returns its structured result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/McpCallRequest"
      responses:
        "200":
          description: Successful tool invocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
        "422":
          description: Tool invocation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
        "500":
          description: Internal server error during tool invocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
  /cases/search:
    post:
      operationId: searchCases
      tags: [cases]
      summary: Vector similarity search over historical crop cases
      description: Accepts a symptom description, generates its embedding, runs pgvector cosine similarity search with optional filters, and returns the top results re-ranked by combining semantic similarity with treatment success rate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseSearchRequest"
      responses:
        "200":
          description: Similar historical cases found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseSearchResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cases/submit:
    post:
      operationId: submitCase
      tags: [cases]
      summary: Submit a resolved crop case to the vector store
      description: Adds a new resolved case with its embedding to the vector knowledge base. This closes the learning loop — new farmer outcomes improve future recommendations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseSubmitRequest"
      responses:
        "201":
          description: Case submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseSubmitResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /intelligence/overview:
    get:
      operationId: getIntelligenceOverview
      tags: [intelligence]
      summary: Regional crop risk intelligence overview
      description: Returns an APAC-wide command-center summary that combines active crop alerts, regional risk scoring, market pressure, subsidy support, and a ranked intervention queue for extension officers.
      responses:
        "200":
          description: Regional intelligence overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceOverview"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /impact/overview:
    get:
      operationId: getImpactOverview
      tags: [impact]
      summary: Impact and business evidence overview
      description: Returns modeled farmer reach, crop value at risk, preventable loss, pilot ROI, buyer segments, judge evidence, and trust-readiness controls.
      responses:
        "200":
          description: Impact and business evidence overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactOverview"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /demo/brief:
    get:
      operationId: getDemoBrief
      tags: [demo]
      summary: Judge demo brief
      description: Returns a 5-minute judge demo run of show, sample prompts, proof pillars, launch readiness, and closing script for the competition presentation.
      responses:
        "200":
          description: Judge demo brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoBrief"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DiagnoseRequest:
      type: object
      properties:
        query:
          type: string
          description: Natural language description of the crop situation
          minLength: 1
          maxLength: 5000
        preferredLanguage:
          type: string
          description: Preferred language for farmer-facing recommendations
          default: English
      required:
        - query
    DiagnoseResponse:
      type: object
      properties:
        sessionId:
          type: string
        query:
          $ref: "#/components/schemas/FarmerQuery"
        diagnosis:
          oneOf:
            - $ref: "#/components/schemas/DiagnosisResult"
            - type: "null"
        weatherAssessment:
          oneOf:
            - $ref: "#/components/schemas/WeatherAssessment"
            - type: "null"
        marketIntelligence:
          oneOf:
            - $ref: "#/components/schemas/MarketIntelligence"
            - type: "null"
        treatmentProtocol:
          oneOf:
            - $ref: "#/components/schemas/TreatmentProtocol"
            - type: "null"
        finalRecommendation:
          type: string
        confidenceScore:
          type: number
        traces:
          type: array
          items:
            $ref: "#/components/schemas/AgentTrace"
        orchestratorDecisions:
          type: array
          items:
            $ref: "#/components/schemas/OrchestratorDecision"
        conflictResolutions:
          type: array
          items:
            $ref: "#/components/schemas/ConflictResolution"
        mcpToolCalls:
          type: array
          items:
            $ref: "#/components/schemas/McpToolCallEntry"
        totalDurationMs:
          type: number
      required:
        - sessionId
        - query
        - finalRecommendation
        - confidenceScore
        - traces
        - orchestratorDecisions
        - conflictResolutions
        - mcpToolCalls
        - totalDurationMs
    FarmerQuery:
      type: object
      properties:
        rawQuery:
          type: string
        preferredLanguage:
          type: string
        cropType:
          type: string
        region:
          type: string
        country:
          type: string
        symptoms:
          type: array
          items:
            type: string
        additionalContext:
          type: string
      required:
        - rawQuery
        - preferredLanguage
        - cropType
        - region
        - country
        - symptoms
        - additionalContext
    DiagnosisResult:
      type: object
      properties:
        primaryDiagnosis:
          type: string
        confidence:
          type: number
        differentialDiagnoses:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              probability:
                type: number
              reasoning:
                type: string
            required:
              - name
              - probability
              - reasoning
        sources:
          type: array
          items:
            type: string
      required:
        - primaryDiagnosis
        - confidence
        - differentialDiagnoses
    WeatherAssessment:
      type: object
      properties:
        currentConditions:
          type: string
        forecast:
          type: string
        weatherRisk:
          type: string
        adaptations:
          type: array
          items:
            type: string
      required:
        - currentConditions
        - forecast
        - weatherRisk
        - adaptations
    MarketIntelligence:
      type: object
      properties:
        currentPrice:
          type: string
        priceOutlook:
          type: string
        recommendation:
          type: string
        availableSubsidies:
          type: array
          items:
            type: string
      required:
        - currentPrice
        - priceOutlook
        - recommendation
        - availableSubsidies
    TreatmentProtocol:
      type: object
      properties:
        immediateActions:
          type: array
          items:
            type: string
        preventiveMeasures:
          type: array
          items:
            type: string
        safetyWarnings:
          type: array
          items:
            type: string
        timelineWeeks:
          type: number
        estimatedCost:
          type: string
        localResources:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: string
      required:
        - immediateActions
        - preventiveMeasures
        - safetyWarnings
        - timelineWeeks
        - estimatedCost
        - localResources
    AgentTrace:
      type: object
      properties:
        agentName:
          type: string
        startedAt:
          type: number
        completedAt:
          type: number
        durationMs:
          type: number
        input:
          type: object
        output:
          $ref: "#/components/schemas/AgentFinding"
      required:
        - agentName
        - startedAt
        - completedAt
        - durationMs
        - input
        - output
    AgentFinding:
      type: object
      properties:
        agentName:
          type: string
        status:
          type: string
          enum:
            - success
            - error
            - skipped
        confidence:
          type: number
        summary:
          type: string
        details:
          type: object
        reasoning:
          type: string
      required:
        - agentName
        - status
        - confidence
        - summary
        - details
        - reasoning
    OrchestratorDecision:
      type: object
      properties:
        agentName:
          type: string
        action:
          type: string
          enum:
            - invoked
            - skipped
            - accepted
            - overridden
            - conflict_resolved
        rationale:
          type: string
        details:
          type: object
      required:
        - agentName
        - action
        - rationale
    ConflictResolution:
      type: object
      properties:
        conflictType:
          type: string
        agentA:
          type: string
        agentB:
          type: string
        resolution:
          type: string
        rationale:
          type: string
        chosenAgent:
          type: string
      required:
        - conflictType
        - agentA
        - agentB
        - resolution
        - rationale
        - chosenAgent
    McpToolCallEntry:
      type: object
      properties:
        toolName:
          type: string
        params:
          type: object
          additionalProperties: true
        calledBy:
          type: string
        success:
          type: boolean
        data: {}
        error:
          oneOf:
            - type: string
            - type: "null"
      required:
        - toolName
        - params
        - calledBy
        - success
    McpToolListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/McpToolSchema"
      required:
        - tools
    McpToolSchema:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        params:
          type: array
          items:
            $ref: "#/components/schemas/McpToolParam"
      required:
        - name
        - description
        - params
    McpToolParam:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - string
            - number
            - boolean
        required:
          type: boolean
        description:
          type: string
        enum:
          type: array
          items:
            type: string
      required:
        - name
        - type
        - required
        - description
    McpCallRequest:
      type: object
      properties:
        toolName:
          type: string
          description: Name of the MCP tool to invoke
        params:
          type: object
          description: Parameters to pass to the tool
      required:
        - toolName
    McpToolResult:
      type: object
      properties:
        toolName:
          type: string
        success:
          type: boolean
        data:
          {}
        error:
          type: string
        durationMs:
          type: number
      required:
        - toolName
        - success
        - data
        - durationMs
    CaseSearchRequest:
      type: object
      properties:
        symptomsDescription:
          type: string
          description: Natural language description of the crop symptoms to search for similar historical cases
          minLength: 1
        cropType:
          type: string
          description: Optional filter by crop type
        country:
          type: string
          description: Optional filter by country
        topK:
          type: number
          description: Number of results to return (default 5, max 20)
      required:
        - symptomsDescription
    CaseSearchResponse:
      type: object
      properties:
        query:
          type: string
        filters:
          type: object
          properties:
            cropType:
              type: string
            country:
              type: string
        candidatesFound:
          type: number
        results:
          type: array
          items:
            $ref: "#/components/schemas/SimilarCase"
        durationMs:
          type: number
      required:
        - query
        - filters
        - candidatesFound
        - results
        - durationMs
    SimilarCase:
      type: object
      properties:
        caseId:
          type: string
        cropType:
          type: string
        country:
          type: string
        region:
          type: string
        symptomsText:
          type: string
        diagnosis:
          type: string
        treatmentApplied:
          type: string
        outcomeScore:
          type: number
        resolvedAt:
          type: string
        similarityScore:
          type: number
        weightedScore:
          type: number
      required:
        - caseId
        - cropType
        - country
        - region
        - symptomsText
        - diagnosis
        - treatmentApplied
        - outcomeScore
        - resolvedAt
        - similarityScore
        - weightedScore
    CaseSubmitRequest:
      type: object
      properties:
        cropType:
          type: string
        country:
          type: string
        region:
          type: string
        symptomsText:
          type: string
        diagnosis:
          type: string
        treatmentApplied:
          type: string
        outcomeScore:
          type: number
          minimum: 0
          maximum: 1
      required:
        - cropType
        - country
        - region
        - symptomsText
        - diagnosis
        - treatmentApplied
        - outcomeScore
    CaseSubmitResponse:
      type: object
      properties:
        caseId:
          type: string
        success:
          type: boolean
        message:
          type: string
      required:
        - caseId
        - success
        - message
    RiskLevel:
      type: string
      enum:
        - low
        - medium
        - high
        - critical
    IntelligenceOverview:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        summary:
          type: object
          properties:
            activeAlerts:
              type: number
            countriesCovered:
              type: number
            regionsAtRisk:
              type: number
            criticalRegions:
              type: number
            totalAffectedAreaHa:
              type: number
            activeSubsidyPrograms:
              type: number
            marketsTracked:
              type: number
          required:
            - activeAlerts
            - countriesCovered
            - regionsAtRisk
            - criticalRegions
            - totalAffectedAreaHa
            - activeSubsidyPrograms
            - marketsTracked
        countries:
          type: array
          items:
            $ref: "#/components/schemas/CountryRiskSummary"
        regions:
          type: array
          items:
            $ref: "#/components/schemas/RegionRiskSummary"
        interventionQueue:
          type: array
          items:
            $ref: "#/components/schemas/InterventionQueueItem"
      required:
        - generatedAt
        - summary
        - countries
        - regions
        - interventionQueue
    CountryRiskSummary:
      type: object
      properties:
        country:
          type: string
        alertCount:
          type: number
        criticalAlerts:
          type: number
        affectedAreaHa:
          type: number
        highestRiskScore:
          type: number
        activeSubsidyPrograms:
          type: number
      required:
        - country
        - alertCount
        - criticalAlerts
        - affectedAreaHa
        - highestRiskScore
        - activeSubsidyPrograms
    RegionRiskSummary:
      type: object
      properties:
        id:
          type: string
        region:
          type: string
        country:
          type: string
        riskScore:
          type: number
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        alertCount:
          type: number
        affectedAreaHa:
          type: number
        severityCounts:
          type: object
          properties:
            low:
              type: number
            medium:
              type: number
            high:
              type: number
            critical:
              type: number
          required:
            - low
            - medium
            - high
            - critical
        crops:
          type: array
          items:
            type: string
        topThreats:
          type: array
          items:
            type: string
        priorityAction:
          type: string
        leadThreat:
          oneOf:
            - $ref: "#/components/schemas/LeadThreat"
            - type: "null"
        marketSignals:
          type: array
          items:
            $ref: "#/components/schemas/MarketSignal"
        subsidyPrograms:
          type: array
          items:
            $ref: "#/components/schemas/SubsidyProgramSummary"
      required:
        - id
        - region
        - country
        - riskScore
        - riskLevel
        - alertCount
        - affectedAreaHa
        - severityCounts
        - crops
        - topThreats
        - priorityAction
        - leadThreat
        - marketSignals
        - subsidyPrograms
    LeadThreat:
      type: object
      properties:
        alertId:
          type: string
        cropType:
          type: string
        threatName:
          type: string
        threatType:
          type: string
        severity:
          $ref: "#/components/schemas/RiskLevel"
        source:
          oneOf:
            - type: string
            - type: "null"
      required:
        - alertId
        - cropType
        - threatName
        - threatType
        - severity
        - source
    MarketSignal:
      type: object
      properties:
        cropType:
          type: string
        marketsTracked:
          type: number
        avgUsdPerKg:
          oneOf:
            - type: number
            - type: "null"
        avgChange7d:
          oneOf:
            - type: number
            - type: "null"
        avgChange30d:
          oneOf:
            - type: number
            - type: "null"
        pressure:
          type: string
          enum:
            - unknown
            - falling
            - rising
            - stable
      required:
        - cropType
        - marketsTracked
        - avgUsdPerKg
        - avgChange7d
        - avgChange30d
        - pressure
    SubsidyProgramSummary:
      type: object
      properties:
        programId:
          type: string
        programName:
          type: string
        benefitType:
          type: string
        maxBenefitUsd:
          oneOf:
            - type: number
            - type: "null"
        applicationDeadline:
          oneOf:
            - type: string
            - type: "null"
      required:
        - programId
        - programName
        - benefitType
        - maxBenefitUsd
        - applicationDeadline
    InterventionQueueItem:
      type: object
      properties:
        rank:
          type: number
        region:
          type: string
        country:
          type: string
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        riskScore:
          type: number
        affectedAreaHa:
          type: number
        leadThreat:
          oneOf:
            - $ref: "#/components/schemas/LeadThreat"
            - type: "null"
        action:
          type: string
      required:
        - rank
        - region
        - country
        - riskLevel
        - riskScore
        - affectedAreaHa
        - leadThreat
        - action
    ImpactStatus:
      type: string
      enum:
        - ready
        - next
    MarketTrend:
      type: string
      enum:
        - unknown
        - falling
        - rising
        - stable
    ImpactOverview:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/ImpactOverviewSummary"
        countryImpacts:
          type: array
          items:
            $ref: "#/components/schemas/CountryImpact"
        cropImpacts:
          type: array
          items:
            $ref: "#/components/schemas/CropImpact"
        businessCases:
          type: array
          items:
            $ref: "#/components/schemas/BusinessCase"
        judgeScorecard:
          type: array
          items:
            $ref: "#/components/schemas/JudgeScorecardItem"
        proofMilestones:
          type: array
          items:
            $ref: "#/components/schemas/ProofMilestone"
        trustReadiness:
          type: array
          items:
            $ref: "#/components/schemas/TrustReadinessItem"
        methodology:
          $ref: "#/components/schemas/ImpactMethodology"
      required:
        - generatedAt
        - summary
        - countryImpacts
        - cropImpacts
        - businessCases
        - judgeScorecard
        - proofMilestones
        - trustReadiness
        - methodology
    ImpactOverviewSummary:
      type: object
      properties:
        activeAlerts:
          type: number
        affectedAreaHa:
          type: number
        estimatedFarmersInAffectedZones:
          type: number
        modeledValueAtRiskUsd:
          type: number
        modeledPreventableLossUsd:
          type: number
        conservativeFirstSeasonSavingsUsd:
          type: number
        annualPilotCostUsd:
          type: number
        benefitCostRatio:
          type: number
        activeCountries:
          type: number
        cropTypes:
          type: number
        supportPrograms:
          type: number
      required:
        - activeAlerts
        - affectedAreaHa
        - estimatedFarmersInAffectedZones
        - modeledValueAtRiskUsd
        - modeledPreventableLossUsd
        - conservativeFirstSeasonSavingsUsd
        - annualPilotCostUsd
        - benefitCostRatio
        - activeCountries
        - cropTypes
        - supportPrograms
    CountryImpact:
      type: object
      properties:
        country:
          type: string
        alertCount:
          type: number
        criticalAlerts:
          type: number
        affectedAreaHa:
          type: number
        estimatedFarmers:
          type: number
        cropTypes:
          type: array
          items:
            type: string
        valueAtRiskUsd:
          type: number
        preventableLossUsd:
          type: number
      required:
        - country
        - alertCount
        - criticalAlerts
        - affectedAreaHa
        - estimatedFarmers
        - cropTypes
        - valueAtRiskUsd
        - preventableLossUsd
    CropImpact:
      type: object
      properties:
        cropType:
          type: string
        alertCount:
          type: number
        criticalAlerts:
          type: number
        affectedAreaHa:
          type: number
        avgPriceUsdPerKg:
          type: number
        marketTrend30d:
          $ref: "#/components/schemas/MarketTrend"
        valueAtRiskUsd:
          type: number
        preventableLossUsd:
          type: number
      required:
        - cropType
        - alertCount
        - criticalAlerts
        - affectedAreaHa
        - avgPriceUsdPerKg
        - marketTrend30d
