openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CropMind API - APAC Agricultural Intelligence Network
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cropagent
    description: Multi-agent crop intelligence operations
  - name: mcp
    description: MCP tool server operations
  - name: cases
    description: Vector case intelligence operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /cropagent/diagnose:
    post:
      operationId: diagnoseCrop
      tags: [cropagent]
      summary: Run multi-agent crop diagnosis
      description: Accepts a farmer's natural language query and runs it through the multi-agent orchestration system (CropDisease, Weather, Market, Treatment agents) returning a unified diagnosis with traces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnoseRequest"
      responses:
        "200":
          description: Successful diagnosis with full agent traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnoseResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /mcp/tools:
    get:
      operationId: listMcpTools
      tags: [mcp]
      summary: List available MCP tool servers
      description: Returns all registered MCP tool servers with their names, descriptions, and parameter schemas.
      responses:
        "200":
          description: List of available MCP tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolListResponse"
  /mcp/call:
    post:
      operationId: callMcpTool
      tags: [mcp]
      summary: Invoke an MCP tool by name
      description: Calls a specific MCP tool server with the provided parameters and returns its structured result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/McpCallRequest"
      responses:
        "200":
          description: Successful tool invocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
        "422":
          description: Tool invocation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
        "500":
          description: Internal server error during tool invocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpToolResult"
  /cases/search:
    post:
      operationId: searchCases
      tags: [cases]
      summary: Vector similarity search over historical crop cases
      description: Accepts a symptom description, generates its embedding, runs pgvector cosine similarity search with optional filters, and returns the top results re-ranked by combining semantic similarity with treatment success rate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseSearchRequest"
      responses:
        "200":
          description: Similar historical cases found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseSearchResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cases/submit:
    post:
      operationId: submitCase
      tags: [cases]
      summary: Submit a resolved crop case to the vector store
      description: Adds a new resolved case with its embedding to the vector knowledge base. This closes the learning loop — new farmer outcomes improve future recommendations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseSubmitRequest"
      responses:
        "201":
          description: Case submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseSubmitResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DiagnoseRequest:
      type: object
      properties:
        query:
          type: string
          description: Natural language description of the crop situation
          minLength: 1
          maxLength: 5000
      required:
        - query
    DiagnoseResponse:
      type: object
      properties:
        sessionId:
          type: string
        query:
          $ref: "#/components/schemas/FarmerQuery"
        diagnosis:
          oneOf:
            - $ref: "#/components/schemas/DiagnosisResult"
            - type: "null"
        weatherAssessment:
          oneOf:
            - $ref: "#/components/schemas/WeatherAssessment"
            - type: "null"
        marketIntelligence:
          oneOf:
            - $ref: "#/components/schemas/MarketIntelligence"
            - type: "null"
        treatmentProtocol:
          oneOf:
            - $ref: "#/components/schemas/TreatmentProtocol"
            - type: "null"
        finalRecommendation:
          type: string
        confidenceScore:
          type: number
        traces:
          type: array
          items:
            $ref: "#/components/schemas/AgentTrace"
        orchestratorDecisions:
          type: array
          items:
            $ref: "#/components/schemas/OrchestratorDecision"
        conflictResolutions:
          type: array
          items:
            $ref: "#/components/schemas/ConflictResolution"
        mcpToolCalls:
          type: array
          items:
            $ref: "#/components/schemas/McpToolCallEntry"
        totalDurationMs:
          type: number
      required:
        - sessionId
        - query
        - finalRecommendation
        - confidenceScore
        - traces
        - orchestratorDecisions
        - conflictResolutions
        - mcpToolCalls
        - totalDurationMs
    FarmerQuery:
      type: object
      properties:
        rawQuery:
          type: string
        cropType:
          type: string
        region:
          type: string
        country:
          type: string
        symptoms:
          type: array
          items:
            type: string
        additionalContext:
          type: string
      required:
        - rawQuery
        - cropType
        - region
        - country
        - symptoms
        - additionalContext
    DiagnosisResult:
      type: object
      properties:
        primaryDiagnosis:
          type: string
        confidence:
          type: number
        differentialDiagnoses:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              probability:
                type: number
              reasoning:
                type: string
            required:
              - name
              - probability
              - reasoning
      required:
        - primaryDiagnosis
        - confidence
        - differentialDiagnoses
    WeatherAssessment:
      type: object
      properties:
        currentConditions:
          type: string
        forecast:
          type: string
        weatherRisk:
          type: string
        adaptations:
          type: array
          items:
            type: string
      required:
        - currentConditions
        - forecast
        - weatherRisk
        - adaptations
    MarketIntelligence:
      type: object
      properties:
        currentPrice:
          type: string
        priceOutlook:
          type: string
        recommendation:
          type: string
        availableSubsidies:
          type: array
          items:
            type: string
      required:
        - currentPrice
        - priceOutlook
        - recommendation
        - availableSubsidies
    TreatmentProtocol:
      type: object
      properties:
        immediateActions:
          type: array
          items:
            type: string
        preventiveMeasures:
          type: array
          items:
            type: string
        timelineWeeks:
          type: number
        estimatedCost:
          type: string
        localResources:
          type: array
          items:
            type: string
      required:
        - immediateActions
        - preventiveMeasures
        - timelineWeeks
        - estimatedCost
        - localResources
    AgentTrace:
      type: object
      properties:
        agentName:
          type: string
        startedAt:
          type: number
        completedAt:
          type: number
        durationMs:
          type: number
        input:
          type: object
        output:
          $ref: "#/components/schemas/AgentFinding"
      required:
        - agentName
        - startedAt
        - completedAt
        - durationMs
        - input
        - output
    AgentFinding:
      type: object
      properties:
        agentName:
          type: string
        status:
          type: string
          enum:
            - success
            - error
            - skipped
        confidence:
          type: number
        summary:
          type: string
        details:
          type: object
        reasoning:
          type: string
      required:
        - agentName
        - status
        - confidence
        - summary
        - details
        - reasoning
    OrchestratorDecision:
      type: object
      properties:
        agentName:
          type: string
        action:
          type: string
          enum:
            - invoked
            - skipped
            - accepted
            - overridden
            - conflict_resolved
        rationale:
          type: string
        details:
          type: object
      required:
        - agentName
        - action
        - rationale
    ConflictResolution:
      type: object
      properties:
        conflictType:
          type: string
        agentA:
          type: string
        agentB:
          type: string
        resolution:
          type: string
        rationale:
          type: string
        chosenAgent:
          type: string
      required:
        - conflictType
        - agentA
        - agentB
        - resolution
        - rationale
        - chosenAgent
    McpToolCallEntry:
      type: object
      properties:
        toolName:
          type: string
        params:
          type: object
          additionalProperties: true
        calledBy:
          type: string
        success:
          type: boolean
        data: {}
        error:
          oneOf:
            - type: string
            - type: "null"
      required:
        - toolName
        - params
        - calledBy
        - success
    McpToolListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: "#/components/schemas/McpToolSchema"
      required:
        - tools
    McpToolSchema:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        params:
          type: array
          items:
            $ref: "#/components/schemas/McpToolParam"
      required:
        - name
        - description
        - params
    McpToolParam:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - string
            - number
            - boolean
        required:
          type: boolean
        description:
          type: string
        enum:
          type: array
          items:
            type: string
      required:
        - name
        - type
        - required
        - description
    McpCallRequest:
      type: object
      properties:
        toolName:
          type: string
          description: Name of the MCP tool to invoke
        params:
          type: object
          description: Parameters to pass to the tool
      required:
        - toolName
    McpToolResult:
      type: object
      properties:
        toolName:
          type: string
        success:
          type: boolean
        data:
          {}
        error:
          type: string
        durationMs:
          type: number
      required:
        - toolName
        - success
        - data
        - durationMs
    CaseSearchRequest:
      type: object
      properties:
        symptomsDescription:
          type: string
          description: Natural language description of the crop symptoms to search for similar historical cases
          minLength: 1
        cropType:
          type: string
          description: Optional filter by crop type
        country:
          type: string
          description: Optional filter by country
        topK:
          type: number
          description: Number of results to return (default 5, max 20)
      required:
        - symptomsDescription
    CaseSearchResponse:
      type: object
      properties:
        query:
          type: string
        filters:
          type: object
          properties:
            cropType:
              type: string
            country:
              type: string
        candidatesFound:
          type: number
        results:
          type: array
          items:
            $ref: "#/components/schemas/SimilarCase"
        durationMs:
          type: number
      required:
        - query
        - filters
        - candidatesFound
        - results
        - durationMs
    SimilarCase:
      type: object
      properties:
        caseId:
          type: string
        cropType:
          type: string
        country:
          type: string
        region:
          type: string
        symptomsText:
          type: string
        diagnosis:
          type: string
        treatmentApplied:
          type: string
        outcomeScore:
          type: number
        resolvedAt:
          type: string
        similarityScore:
          type: number
        weightedScore:
          type: number
      required:
        - caseId
        - cropType
        - country
        - region
        - symptomsText
        - diagnosis
        - treatmentApplied
        - outcomeScore
        - resolvedAt
        - similarityScore
        - weightedScore
    CaseSubmitRequest:
      type: object
      properties:
        cropType:
          type: string
        country:
          type: string
        region:
          type: string
        symptomsText:
          type: string
        diagnosis:
          type: string
        treatmentApplied:
          type: string
        outcomeScore:
          type: number
          minimum: 0
          maximum: 1
      required:
        - cropType
        - country
        - region
        - symptomsText
        - diagnosis
        - treatmentApplied
        - outcomeScore
    CaseSubmitResponse:
      type: object
      properties:
        caseId:
          type: string
        success:
          type: boolean
        message:
          type: string
      required:
        - caseId
        - success
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
